server:
  port: 8080

spring:
  application:
    name: warehouse-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/warehouse_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置（密钥长度需>=64字节以满足HS512要求）
jwt:
  secret: warehouse-wms-secret-key-2024-secure-random-string-must-be-at-least-64-bytes-long-for-hs512-algorithm
  expiration: 604800000
