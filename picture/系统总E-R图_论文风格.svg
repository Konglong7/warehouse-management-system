<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1700" viewBox="0 0 2400 1700">
  <defs>
    <style>
      .entity {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 3;
      }
      .attribute {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 3;
      }
      .relation {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 3;
      }
      .line {
        stroke: #000000;
        stroke-width: 3;
        fill: none;
      }
      .title {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 34px;
        font-weight: 700;
        text-anchor: middle;
      }
      .entity-text {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 28px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .attribute-text {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 22px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .relation-text {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 24px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .note-text {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 20px;
        font-weight: 400;
        text-anchor: middle;
      }
      .card-text {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 20px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: middle;
