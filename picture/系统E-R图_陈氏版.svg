<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950">
  <defs>
    <style>
      .entity {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 3;
      }
      .relation {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 3;
      }
      .line {
        stroke: #000000;
        stroke-width: 3;
        fill: none;
      }
      .title {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 28px;
        font-weight: 600;
        text-anchor: middle;
      }
      .entity-text {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 32px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .relation-text {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 26px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .cardinality {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 24px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      .note {
        fill: #000000;
        font-family: "Microsoft YaHei", "SimHei", sans-serif;
        font-size: 20px;
        font-weight: 400;
        text-anchor: middle;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="950" fill="#ffffff"/>
  <text class="title" x="800" y="55">智能仓库管理系统整体陈氏 E-R 图</text>

  <!-- 用户实体 -->
  <rect class="entity" x="1180" y="110" width="250" height="90" rx="10" ry="10"/>
  <text class="entity-text" x="1305" y="155">用户</text>

  <!-- 主体实体 -->
  <rect class="entity" x="110" y="390" width="250" height="100" rx="10" ry="10"/>
  <text class="entity-text" x="235" y="440">供应商</text>

  <rect class="entity" x="620" y="390" width="250" height="100" rx="10" ry="10"/>
  <text class="entity-text" x="745" y="440">物料</text>

  <rect class="entity" x="1140" y="390" width="250" height="100" rx="10" ry="10"/>
  <text class="entity-text" x="1265" y="440">仓位</text>

  <!-- 供应关系 -->
  <polygon class="relation" points="490,440 565,370 640,440 565,510"/>
  <text class="relation-text" x="565" y="440">供应</text>

  <line class="line" x1="360" y1="440" x2="490" y2="440"/>
  <line class="line" x1="640" y1="440" x2="620" y2="440"/>
  <text class="cardinality" x="425" y="408">1</text>
  <text class="cardinality" x="650" y="408">N</text>

  <!-- 入库关系 -->
  <polygon class="relation" points="930,300 1005,230 1080,300 1005,370"/>
  <text class="relation-text" x="1005" y="300">入库</text>

  <line class="line" x1="870" y1="420" x2="930" y2="300"/>
  <line class="line" x1="1140" y1="420" x2="1080" y2="300"/>
  <text class="cardinality" x="895" y="330">N</text>
  <text class="cardinality" x="1115" y="330">N</text>

  <!-- 出库关系 -->
  <polygon class="relation" points="930,580 1005,510 1080,580 1005,650"/>
  <text class="relation-text" x="1005" y="580">出库</text>

  <line class="line" x1="870" y1="460" x2="930" y2="580"/>
  <line class="line" x1="1140" y1="460" x2="1080" y2="580"/>
  <text class="cardinality" x="895" y="550">N</text>
  <text class="cardinality" x="1115" y="550">N</text>

  <!-- 说明 -->
  <text class="note" x="800" y="860">注：当前数据库中，用户实体独立存在，未与业务表建立外键联系。</text>
</svg>
